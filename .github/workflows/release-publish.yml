name: Promote tested release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Draft release tag to promote without rebuilding
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-22.04
    environment: release
    outputs:
      prerelease: ${{ steps.version.outputs.prerelease }}
      pep440: ${{ steps.version.outputs.pep440 }}
      display: ${{ steps.version.outputs.display }}
    permissions:
      contents: read
      attestations: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
      - run: sudo apt-get update && sudo apt-get install -y zstd
      - id: version
        run: python packaging/scripts/release_version.py "${{ inputs.tag }}" --github-output >> "$GITHUB_OUTPUT"
      - name: Download exact draft assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release="repos/$GITHUB_REPOSITORY/releases/tags/${{ inputs.tag }}"
          test "$(gh api "$release" --jq .draft)" = true
          test "$(gh api "$release" --jq .tag_name)" = "${{ inputs.tag }}"
          git fetch --no-tags origin main:refs/remotes/origin/main
          test "$(git cat-file -t '${{ inputs.tag }}')" = tag
          tag_commit=$(git rev-list -n 1 "${{ inputs.tag }}")
          test "$tag_commit" = "$(git rev-parse HEAD)"
          git merge-base --is-ancestor "$tag_commit" origin/main
          echo "HOLDERPRO_BUILD_ID=$tag_commit" >> "$GITHUB_ENV"
          mkdir release-assets
          gh release download "${{ inputs.tag }}" --dir release-assets
      - name: Recheck legal publication gates
        env:
          LICENSE_REVIEW_APPROVED: ${{ vars.HOLDERPRO_LICENSE_REVIEW_APPROVED }}
          TRADEMARK_REVIEW_APPROVED: ${{ vars.HOLDERPRO_TRADEMARK_REVIEW_APPROVED }}
        run: |
          test "$LICENSE_REVIEW_APPROVED" = true || { echo "Independent binary license review is not approved" >&2; exit 1; }
          if [ "${{ steps.version.outputs.prerelease }}" = false ]; then
            test "$TRADEMARK_REVIEW_APPROVED" = true || { echo "Stable branding requires a professional trademark knockout review" >&2; exit 1; }
          fi
      - run: python packaging/scripts/checksums.py release-assets --verify
      - name: Verify exact checksummed inventory
        run: |
          python packaging/scripts/verify_release_assets.py release-assets \
            --display-version "${{ steps.version.outputs.display }}" \
            --pep440-version "${{ steps.version.outputs.pep440 }}" \
            --include-checksums
      - name: Reverify the complete corresponding-source archive
        run: |
          python packaging/scripts/verify_corresponding_source.py \
            "release-assets/holderpro-${{ steps.version.outputs.display }}-corresponding-source.tar.zst"
      - name: Verify every payload is bound to the current tag commit
        run: |
          python packaging/scripts/verify_release_provenance.py release-assets \
            --display-version "${{ steps.version.outputs.display }}" \
            --pep440-version "${{ steps.version.outputs.pep440 }}" \
            --build-id "$HOLDERPRO_BUILD_ID"
      - name: Verify build provenance for all source and binary subjects
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          workflow_identity="^https://github\\.com/${GITHUB_REPOSITORY}/\\.github/workflows/release-build\\.yml@refs/(tags/.+|heads/main)$"
          find release-assets -maxdepth 1 -type f ! -name SHA256SUMS -print0 | while IFS= read -r -d '' asset; do
            gh attestation verify "$asset" --repo "$GITHUB_REPOSITORY" \
              --cert-identity-regex "$workflow_identity" --deny-self-hosted-runners
          done
      - name: Select wheels only
        run: |
          mkdir wheels
          cp release-assets/*.whl wheels/
          test "$(find wheels -maxdepth 1 -name '*.whl' | wc -l)" -eq 4
          test -z "$(find wheels -type f ! -name '*.whl' -print -quit)"
          test -z "$(find release-assets -maxdepth 1 -type f -name 'holderpro*.tar.gz' -print -quit)"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pypi-wheels-${{ inputs.tag }}
          path: wheels
          if-no-files-found: error

  publish-release:
    needs: verify
    runs-on: ubuntu-22.04
    environment: release
    permissions:
      contents: write
    steps:
      - name: Publish the existing GitHub draft without rebuilding
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          args=(--draft=false)
          if [ "${{ needs.verify.outputs.prerelease }}" = true ]; then args+=(--prerelease=true); else args+=(--prerelease=false --latest); fi
          gh release edit "${{ inputs.tag }}" "${args[@]}" --repo "$GITHUB_REPOSITORY"

  verify-public-source:
    needs: [verify, publish-release]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: pypi-wheels-${{ inputs.tag }}
          path: dist
      - name: Reject source distributions
        run: |
          test "$(find dist -maxdepth 1 -name '*.whl' | wc -l)" -eq 4
          test -z "$(find dist -maxdepth 1 -type f ! -name '*.whl' -print -quit)"
      - name: Require public version-matched corresponding source
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          source_name="holderpro-${{ needs.verify.outputs.display }}-corresponding-source.tar.zst"
          gh release download "${{ inputs.tag }}" --repo "$GITHUB_REPOSITORY" --pattern "$source_name" --dir "$RUNNER_TEMP/public-source"
          test -s "$RUNNER_TEMP/public-source/$source_name"

  pypi:
    needs: verify-public-source
    runs-on: ubuntu-22.04
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: pypi-wheels-${{ inputs.tag }}
          path: dist
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
