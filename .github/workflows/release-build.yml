# Official binary channels: github-release and PyPI.
name: Build release draft

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing annotated release tag
        required: true
        type: string

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ inputs.tag }}
  PRUSA_COMMIT: b028299c770b8380ee81c921a2867d522f288123
  PIP_CONSTRAINT: ${{ github.workspace }}/packaging/release-constraints.txt

jobs:
  preflight:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    environment: release
    outputs:
      pep440: ${{ steps.version.outputs.pep440 }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      display: ${{ steps.version.outputs.display }}
      build_commit: ${{ steps.source_commit.outputs.build_commit }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: main
          fetch-depth: 0
      - id: version
        run: python packaging/scripts/release_version.py "$RELEASE_TAG" --github-output >> "$GITHUB_OUTPUT"
      - name: Validate the annotated tag with protected-main tooling
        id: source_commit
        run: |
          trusted_main=$(git rev-parse HEAD)
          git fetch --force origin "+refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
          test "$(git cat-file -t "$RELEASE_TAG")" = tag
          build_commit=$(git rev-list -n 1 "$RELEASE_TAG")
          git merge-base --is-ancestor "$build_commit" "$trusted_main"
          echo "build_commit=$build_commit" >> "$GITHUB_OUTPUT"
          git checkout --detach "$build_commit"
      - name: Match tag, Python package, and native product versions
        env:
          EXPECTED_VERSION: ${{ steps.version.outputs.pep440 }}
        run: |
          python - <<'PY'
          import os
          import re
          import tomllib
          from pathlib import Path

          project = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          package_version = project["project"]["version"]
          version_source = Path("src/holderpro/version.py").read_text(encoding="utf-8")
          match = re.search(r'^FALLBACK_VERSION\s*=\s*"([^"]+)"$', version_source, re.MULTILINE)
          if match is None:
              raise SystemExit("src/holderpro/version.py has no FALLBACK_VERSION")
          expected = os.environ["EXPECTED_VERSION"]
          if package_version != expected or match.group(1) != expected:
              raise SystemExit(
                  "release version mismatch: "
                  f"tag={expected}, pyproject={package_version}, fallback={match.group(1)}"
              )
          PY
      - run: python packaging/scripts/validate_schema.py
      - run: python packaging/scripts/check_licenses.py
      - run: python packaging/scripts/verify_source_manifest.py

  source:
    needs: preflight
    runs-on: ubuntu-22.04
    environment: release
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.preflight.outputs.build_commit }}
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11.9"
          cache: pip
      - run: sudo apt-get update && sudo apt-get install -y zstd
      - name: Fetch exact complete PrusaSlicer source
        run: |
          git init "$RUNNER_TEMP/PrusaSlicer"
          git -C "$RUNNER_TEMP/PrusaSlicer" remote add origin https://github.com/prusa3d/PrusaSlicer.git
          git -C "$RUNNER_TEMP/PrusaSlicer" fetch --depth 1 origin "$PRUSA_COMMIT"
          git -C "$RUNNER_TEMP/PrusaSlicer" checkout --detach FETCH_HEAD
          test -z "$(git -C "$RUNNER_TEMP/PrusaSlicer" status --porcelain --untracked-files=all)"
      - run: python -m pip install --upgrade pip
      - name: Install the exact source-manifest dependency closure
        run: python -m pip install --requirement packaging/release-constraints.txt
      - name: Resolve and fetch native dependency sources
        run: |
          python packaging/scripts/build_dependency_manifest.py \
            --prusa-source "$RUNNER_TEMP/PrusaSlicer" \
            --holderpro-build-id "${{ needs.preflight.outputs.build_commit }}" \
            --output "$RUNNER_TEMP/dependency-sources.json"
          python packaging/scripts/fetch_dependency_sources.py \
            --manifest "$RUNNER_TEMP/dependency-sources.json" \
            --output "$RUNNER_TEMP/dependency-source-archives"
      - name: Build the closed native legal-notice bundle
        run: |
          python packaging/scripts/build_native_license_bundle.py \
            --manifest "$RUNNER_TEMP/dependency-sources.json" \
            --dependency-source-directory "$RUNNER_TEMP/dependency-source-archives" \
            --prusa-source "$RUNNER_TEMP/PrusaSlicer" \
            --output "$RUNNER_TEMP/native-license-bundle"
      - name: Build and independently verify corresponding source
        run: |
          python packaging/scripts/build_corresponding_source.py \
            --repository . \
            --prusa-source "$RUNNER_TEMP/PrusaSlicer" \
            --dependency-manifest "$RUNNER_TEMP/dependency-sources.json" \
            --dependency-source-directory "$RUNNER_TEMP/dependency-source-archives" \
            --version "${{ needs.preflight.outputs.display }}" \
            --output "$RUNNER_TEMP/holderpro-${{ needs.preflight.outputs.display }}-corresponding-source.tar.zst"
          python packaging/scripts/verify_corresponding_source.py \
            "$RUNNER_TEMP/holderpro-${{ needs.preflight.outputs.display }}-corresponding-source.tar.zst"
          mkdir release-assets
          cp "$RUNNER_TEMP/dependency-sources.json" release-assets/
          cp "$RUNNER_TEMP/holderpro-${{ needs.preflight.outputs.display }}-corresponding-source.tar.zst" release-assets/
      - uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: release-assets/*
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: native-license-bundle
          path: ${{ runner.temp }}/native-license-bundle
          if-no-files-found: error
          retention-days: 30
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-source
          path: release-assets
          if-no-files-found: error
          retention-days: 30

  platform:
    needs: [preflight, source]
    environment: release
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-arm64
            runner: macos-15
            wheel: macosx_13_0_arm64
          - target: macos-x86_64
            runner: macos-15-intel
            wheel: macosx_13_0_x86_64
          - target: windows-x86_64
            runner: windows-2022
            wheel: win_amd64
          - target: linux-x86_64
            runner: ubuntu-22.04
            wheel: manylinux_2_35_x86_64
    runs-on: ${{ matrix.runner }}
    env:
      HOLDERPRO_NATIVE_CACHE: ${{ github.workspace }}/.native-cache
      HOLDERPRO_VERSION: ${{ needs.preflight.outputs.pep440 }}
      HOLDERPRO_BUILD_ID: ${{ needs.preflight.outputs.build_commit }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.preflight.outputs.build_commit }}
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11.9"
          cache: pip
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: native-license-bundle
          path: ${{ runner.temp }}/native-license-bundle
      - name: Restore immutable native source and download inputs
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ${{ github.workspace }}/.native-cache/downloads
            ${{ github.workspace }}/.native-cache/prusaslicer-b028299c770b8380ee81c921a2867d522f288123
          key: release-prusa-inputs-2.9.6-${{ matrix.target }}-${{ hashFiles('scripts/build-native.*', 'scripts/prefetch-native-dependencies.cmake', 'packaging/prusaslicer-native-dependency-sources.json') }}
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y autoconf automake libdbus-1-dev libgl1-mesa-dev libtool m4 ninja-build texinfo
      - if: runner.os == 'macOS'
        run: |
          brew install autoconf automake libtool m4 ninja texinfo
          echo "$(brew --prefix texinfo)/bin" >> "$GITHUB_PATH"
      - if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
        with:
          arch: x64
      - name: Build pinned native engine (Unix)
        if: runner.os != 'Windows'
        run: ./scripts/build-native.sh --preset "${{ matrix.target }}" --download-source --version "$HOLDERPRO_VERSION" --build-id "$HOLDERPRO_BUILD_ID"
      - name: Build pinned native engine (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/build-native.ps1 -Preset "${{ matrix.target }}" -DownloadSource -Version $env:HOLDERPRO_VERSION -BuildId $env:HOLDERPRO_BUILD_ID
      - name: Save immutable native source and download inputs
        uses: actions/cache/save@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ${{ github.workspace }}/.native-cache/downloads
            ${{ github.workspace }}/.native-cache/prusaslicer-b028299c770b8380ee81c921a2867d522f288123
          key: release-prusa-inputs-2.9.6-${{ matrix.target }}-${{ hashFiles('scripts/build-native.*', 'scripts/prefetch-native-dependencies.cmake', 'packaging/prusaslicer-native-dependency-sources.json') }}
      - name: Install native runtime
        shell: bash
        run: |
          extra=()
          if [ "$RUNNER_OS" != Windows ]; then extra+=(--strip); fi
          cmake --install "native/build/${{ matrix.target }}" --prefix "native/stage/${{ matrix.target }}" "${extra[@]}"
      - name: Resolve a macOS 13-compatible Python dependency closure
        if: runner.os == 'macOS'
        env:
          HOLDERPRO_MACOS_WHEEL_PLATFORM: ${{ matrix.wheel }}
        run: |
          wheelhouse="$RUNNER_TEMP/holderpro-macos13-wheelhouse"
          mkdir "$wheelhouse"
          python -m pip download \
            --dest "$wheelhouse" \
            --only-binary=:all: \
            --platform "$HOLDERPRO_MACOS_WHEEL_PLATFORM" \
            --python-version 311 \
            --implementation cp \
            --abi cp311 \
            --abi abi3 \
            --abi none \
            --requirement packaging/release-constraints.txt
          python -m pip install \
            --no-index \
            --find-links "$wheelhouse" \
            --requirement packaging/release-constraints.txt
      - name: Audit the macOS 13 deployment floor
        if: runner.os == 'macOS'
        run: python packaging/scripts/audit_macos_deployment_targets.py "native/stage/${{ matrix.target }}/bin" --maximum-version 13.0
      - name: Audit installed native runtime
        shell: bash
        run: |
          python -m pip install pefile
          python packaging/scripts/audit_native_dependencies.py \
            "native/stage/${{ matrix.target }}/bin/holderpro-organic-engine${{ runner.os == 'Windows' && '.exe' || '' }}" \
            --companion-dir "native/stage/${{ matrix.target }}/bin"
      - name: Verify native identity and provenance
        shell: bash
        run: |
          mkdir -p "release-assets/${{ matrix.target }}"
          python packaging/scripts/verify_native_stage.py \
            --native-bin "native/stage/${{ matrix.target }}/bin" \
            --expected-version "$HOLDERPRO_VERSION" \
            --expected-target "${{ matrix.target }}" \
            --expected-build-id "$HOLDERPRO_BUILD_ID" \
            --manifest-out "release-assets/${{ matrix.target }}/HolderPro-${{ matrix.target }}-native-manifest.json"
      - name: Real-engine regression suite
        shell: bash
        env:
          HOLDERPRO_REAL_ENGINE: ${{ github.workspace }}/native/stage/${{ matrix.target }}/bin/holderpro-organic-engine${{ runner.os == 'Windows' && '.exe' || '' }}
        run: |
          python -m pip install -e ".[dev]"
          python -c "from pathlib import Path; assert Path('tests/test_real_engine.py').is_file()"
          pytest tests/test_real_engine.py
      - name: Build and verify platform wheel
        shell: bash
        run: |
          python -m pip install build setuptools wheel
          python packaging/scripts/build_platform_wheel.py \
            --repository . \
            --native-bin "native/stage/${{ matrix.target }}/bin" \
            --version "$HOLDERPRO_VERSION" \
            --build-id "$HOLDERPRO_BUILD_ID" \
            --target "${{ matrix.target }}" \
            --platform-tag "${{ matrix.wheel }}" \
            --native-license-directory "$RUNNER_TEMP/native-license-bundle" \
            --output "release-assets/${{ matrix.target }}"
          python packaging/scripts/verify_platform_wheel.py \
            "release-assets/${{ matrix.target }}"/*.whl \
            --platform-tag "${{ matrix.wheel }}" \
            --version "$HOLDERPRO_VERSION" \
            --build-id "$HOLDERPRO_BUILD_ID" \
            --target "${{ matrix.target }}"
      - name: Clean-install CLI wheel smoke test
        shell: bash
        run: |
          python -m venv "$RUNNER_TEMP/wheel-test"
          if [ "$RUNNER_OS" = Windows ]; then
            wheel_python="$RUNNER_TEMP/wheel-test/Scripts/python.exe"
            wheel_cli="$RUNNER_TEMP/wheel-test/Scripts/holderpro.exe"
          else
            wheel_python="$RUNNER_TEMP/wheel-test/bin/python"
            wheel_cli="$RUNNER_TEMP/wheel-test/bin/holderpro"
          fi
          "$wheel_python" -m pip install "release-assets/${{ matrix.target }}"/*.whl
          "$wheel_cli" version --json
          REFERENCE="$RUNNER_TEMP/clean wheel Ω reference.stl" \
          SUPPORTS="$RUNNER_TEMP/clean wheel Ω supports.stl" \
          "$wheel_python" - <<'PY'
          import os
          from importlib.util import find_spec
          from pathlib import Path

          assert find_spec("networkx") is None
          assert find_spec("lxml") is None
          import trimesh

          trimesh.creation.box(extents=(10.0, 8.0, 2.0)).export(Path(os.environ["REFERENCE"]))
          PY
          "$wheel_cli" generate \
            "$RUNNER_TEMP/clean wheel Ω reference.stl" \
            "$RUNNER_TEMP/clean wheel Ω supports.stl" \
            --bottom-height 8 --base-thickness 3 --layer-height 0.4
          SUPPORTS="$RUNNER_TEMP/clean wheel Ω supports.stl" \
          "$wheel_python" - <<'PY'
          import os
          from pathlib import Path

          import trimesh

          support = trimesh.load_mesh(Path(os.environ["SUPPORTS"]), process=True)
          assert support.is_watertight and support.is_volume and support.volume > 0
          PY
      - name: Generate wheel SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: release-assets/${{ matrix.target }}/holderpro-${{ needs.preflight.outputs.pep440 }}-py3-none-${{ matrix.wheel }}.whl
          format: cyclonedx-json
          output-file: release-assets/${{ matrix.target }}/HolderPro-${{ matrix.target }}.cdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Record target-specific build environment
        shell: bash
        run: |
          python packaging/scripts/write_build_environment.py \
            --target "${{ matrix.target }}" \
            --version "$HOLDERPRO_VERSION" \
            --build-id "$HOLDERPRO_BUILD_ID" \
            --output "release-assets/${{ matrix.target }}/HolderPro-${{ matrix.target }}-build-environment.json"
      - name: Digest-bind all final target assets to the build commit
        shell: bash
        run: |
          python packaging/scripts/write_release_asset_manifest.py \
            "release-assets/${{ matrix.target }}" \
            --target "${{ matrix.target }}" \
            --display-version "${{ needs.preflight.outputs.display }}" \
            --pep440-version "$HOLDERPRO_VERSION" \
            --build-id "$HOLDERPRO_BUILD_ID" \
            --output "release-assets/${{ matrix.target }}/HolderPro-${{ matrix.target }}-asset-manifest.json"
      - uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: release-assets/${{ matrix.target }}/*
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-${{ matrix.target }}
          path: release-assets/${{ matrix.target }}
          if-no-files-found: error
          retention-days: 30

  package-test:
    name: Clean wheel test (${{ matrix.target }})
    needs: [preflight, platform]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-arm64
            runner: macos-15
            qt_platform: cocoa
          - target: macos-x86_64
            runner: macos-15-intel
            qt_platform: cocoa
          - target: windows-x86_64
            runner: windows-2022
            qt_platform: offscreen
          - target: linux-x86_64
            runner: ubuntu-22.04
            qt_platform: offscreen
    runs-on: ${{ matrix.runner }}
    env:
      # The artifact-only job has no repository checkout and intentionally lets
      # pip resolve the public dependency ranges declared by the wheel.
      PIP_CONSTRAINT: ""
    steps:
      # Intentionally no checkout, PrusaSlicer, Git, CMake, or compiler. This
      # job installs only the exact downloadable wheel and its PyPI dependencies.
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11.9"
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: release-${{ matrix.target }}
          path: package
      - name: Install wheel with GUI dependencies and smoke-test the public commands
        shell: bash
        env:
          # VTK's QVTK interactor crashes with Qt's offscreen plugin on macOS;
          # hosted macOS runners have a native WindowServer/Cocoa session.
          QT_QPA_PLATFORM: ${{ matrix.qt_platform }}
        run: |
          if [ "$RUNNER_OS" = Windows ]; then
            python -c 'import ctypes; ctypes.WinDLL("MSVCP140.dll")'
          fi
          test "$(find package -maxdepth 1 -type f -name '*.whl' | wc -l)" -eq 1
          wheel=$(find package -maxdepth 1 -type f -name '*.whl' -print -quit)
          python -m venv "$RUNNER_TEMP/holderpro-clean-wheel"
          if [ "$RUNNER_OS" = Windows ]; then
            wheel_python="$RUNNER_TEMP/holderpro-clean-wheel/Scripts/python.exe"
            wheel_cli="$RUNNER_TEMP/holderpro-clean-wheel/Scripts/holderpro.exe"
          else
            wheel_python="$RUNNER_TEMP/holderpro-clean-wheel/bin/python"
            wheel_cli="$RUNNER_TEMP/holderpro-clean-wheel/bin/holderpro"
          fi
          "$wheel_python" -m pip install "${wheel}[gui]"
          "$wheel_cli" version --json
          "$wheel_python" - <<'PY'
          from PySide6.QtWidgets import QApplication
          from holderpro.preview import ModelPreviewWidget

          application = QApplication.instance() or QApplication([])
          assert application is not None
          assert ModelPreviewWidget is not None
          PY
          REFERENCE="$RUNNER_TEMP/package wheel Ω reference.stl" \
          SUPPORTS="$RUNNER_TEMP/package wheel Ω supports.stl" \
          "$wheel_python" - <<'PY'
          import os
          from pathlib import Path

          import trimesh

          trimesh.creation.box(extents=(10.0, 8.0, 2.0)).export(Path(os.environ["REFERENCE"]))
          PY
          "$wheel_cli" generate \
            "$RUNNER_TEMP/package wheel Ω reference.stl" \
            "$RUNNER_TEMP/package wheel Ω supports.stl" \
            --bottom-height 8 --base-thickness 3 --layer-height 0.4
          REFERENCE="$RUNNER_TEMP/package wheel Ω reference.stl" \
          SUPPORTS="$RUNNER_TEMP/package wheel Ω supports.stl" \
          "$wheel_python" - <<'PY'
          import os
          from pathlib import Path

          import trimesh
          from PySide6.QtWidgets import QApplication

          from holderpro.mesh_io import load_reference_mesh
          from holderpro.preview import (
              PAINT_MODE_ENFORCER,
              PAINT_MODE_POSE,
              ModelPreviewWidget,
              load_support_preview_mesh,
          )

          reference_path = Path(os.environ["REFERENCE"])
          support_path = Path(os.environ["SUPPORTS"])
          support = trimesh.load_mesh(support_path, process=True)
          assert support.is_watertight and support.is_volume and support.volume > 0
          application = QApplication.instance() or QApplication([])
          preview = ModelPreviewWidget()
          preview.resize(640, 480)
          reference = load_reference_mesh(reference_path)
          preview.load_mesh(reference)
          assert len(preview._display_mesh.faces) == len(reference.faces)
          assert len(preview._display_mesh.vertices) <= len(reference.vertices)
          preview.load_support_mesh(load_support_preview_mesh(support_path))
          preview.show()
          application.processEvents()
          render_window = preview.vtk_widget.GetRenderWindow()
          render_window.SetOffScreenRendering(1)
          render_window.Render()
          assert preview._support_actor.GetVisibility()
          assert preview._support_polydata.GetNumberOfCells() == len(support.faces)
          assert preview.height_scrubber.isHidden()
          assert not preview.height_scrubber.isEnabled()
          assert render_window.SupportsOpenGL()
          assert all(
              tuple(actor.GetProperty().GetColor()) == (1.0, 1.0, 1.0)
              for actor in preview._bed_actors
          )
          assert [actor.GetProperty().GetOpacity() for actor in preview._bed_actors] == [
              0.3,
              0.62,
              0.95,
          ]
          assert all(not actor.GetProperty().GetLighting() for actor in preview._bed_actors)
          preview.set_background_colors((0.95, 0.96, 0.98))
          assert all(
              tuple(actor.GetProperty().GetColor()) == (0.0, 0.0, 0.0)
              for actor in preview._bed_actors
          )
          preview.set_paint_mode(PAINT_MODE_POSE)
          assert all(actor.GetVisibility() for actor in preview._pose_handle_actors.values())
          assert not preview.height_scrubber.isHidden()
          assert preview.height_scrubber.isEnabled()
          initial_height = preview._pose[3]
          preview.height_scrubber.heightDragged.emit(-10.0)
          assert abs(preview._pose[3] - initial_height - 1.5) < 1e-9
          assert not preview._support_actor.GetVisibility()
          assert preview._analysis_pose != preview._pose
          preview.height_scrubber.dragFinished.emit()
          assert preview._analysis_pose == preview._pose
          initial_pose = preview._pose
          preview.rotate_pose_axis("z", 12.0, interactive=True)
          assert preview._pose != initial_pose
          assert preview._analysis_pose != preview._pose
          preview.end_pose_drag()
          assert preview._analysis_pose == preview._pose
          preview.set_paint_mode(PAINT_MODE_ENFORCER)
          assert not any(
              actor.GetVisibility() for actor in preview._pose_handle_actors.values()
          )
          assert preview.height_scrubber.isHidden()
          assert not preview.height_scrubber.isEnabled()
          locked_pose = preview._pose
          preview.height_scrubber.heightDragged.emit(-10.0)
          assert preview._pose == locked_pose
          assert preview.begin_pose_drag(0, 0) is None
          preview.close()
          application.processEvents()
          PY

  draft:
    needs: [preflight, source, platform, package-test]
    runs-on: ubuntu-22.04
    environment: release
    permissions:
      contents: write
      attestations: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.preflight.outputs.build_commit }}
      - run: sudo apt-get update && sudo apt-get install -y zstd
      - name: Recheck tag identity before assembling the draft
        run: |
          git fetch --force origin "+refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
          test "$(git cat-file -t "$RELEASE_TAG")" = tag
          test "$(git rev-list -n 1 "$RELEASE_TAG")" = "${{ needs.preflight.outputs.build_commit }}"
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true
      - name: Verify exact closed artifact inventory
        run: |
          python packaging/scripts/verify_release_assets.py release-assets \
            --display-version "${{ needs.preflight.outputs.display }}" \
            --pep440-version "${{ needs.preflight.outputs.pep440 }}"
      - name: Verify every payload is bound to the tag commit
        run: |
          python packaging/scripts/verify_release_provenance.py release-assets \
            --display-version "${{ needs.preflight.outputs.display }}" \
            --pep440-version "${{ needs.preflight.outputs.pep440 }}" \
            --build-id "${{ needs.preflight.outputs.build_commit }}"
      - name: Verify GitHub build provenance for every draft asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          workflow_identity="https://github.com/$GITHUB_WORKFLOW_REF"
          find release-assets -maxdepth 1 -type f -print0 | while IFS= read -r -d '' asset; do
            gh attestation verify "$asset" --repo "$GITHUB_REPOSITORY" \
              --cert-identity "$workflow_identity" --deny-self-hosted-runners
          done
      - run: python packaging/scripts/checksums.py release-assets
      - run: python packaging/scripts/checksums.py release-assets --verify
      - name: Verify checksummed artifact inventory
        run: |
          python packaging/scripts/verify_release_assets.py release-assets \
            --display-version "${{ needs.preflight.outputs.display }}" \
            --pep440-version "${{ needs.preflight.outputs.pep440 }}" \
            --include-checksums
      - name: Create draft release from exact artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ needs.preflight.outputs.prerelease }}" = true ]; then release_kind=prerelease; else release_kind=release; fi
          source_url="https://github.com/$GITHUB_REPOSITORY/releases/download/$RELEASE_TAG/holderpro-${{ needs.preflight.outputs.display }}-corresponding-source.tar.zst"
          cat > "$RUNNER_TEMP/release-notes.md" <<EOF
          HolderPro ${{ needs.preflight.outputs.display }} is a $release_kind of the exact Organic-support stand designer.

          The four platform wheels are the same files offered through PyPI. Each has SHA-256 checksums, a wheel SBOM, GitHub build provenance, and a [version-matched corresponding-source archive]($source_url). See the [release-authenticity guide](https://github.com/$GITHUB_REPOSITORY/blob/$RELEASE_TAG/docs/release-authenticity.md) for verification steps. HolderPro is independent and is not affiliated with or endorsed by Prusa Research.
          EOF
          flags=(--draft --verify-tag --title "HolderPro ${{ needs.preflight.outputs.display }}" --notes-file "$RUNNER_TEMP/release-notes.md")
          if [ "${{ needs.preflight.outputs.prerelease }}" = true ]; then flags+=(--prerelease); fi
          gh release create "$RELEASE_TAG" "${flags[@]}" release-assets/*
