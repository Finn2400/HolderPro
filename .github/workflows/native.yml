name: Native engine

on:
  push:
    branches: [main]
    paths:
      - "native/**"
      - "scripts/build-native.*"
      - "scripts/prefetch-native-dependencies.cmake"
      - "packaging/prusaslicer-native-dependency-sources.json"
      - "packaging/native-runtime-allowlist.json"
      - "packaging/release-targets.json"
      - "packaging/scripts/audit_native_dependencies.py"
      - "packaging/scripts/verify_native_stage.py"
      - "tests/test_real_engine.py"
      - "src/holderpro/**"
      - "pyproject.toml"
      - ".github/workflows/native.yml"
  pull_request:
    paths:
      - "native/**"
      - "scripts/build-native.*"
      - "scripts/prefetch-native-dependencies.cmake"
      - "packaging/prusaslicer-native-dependency-sources.json"
      - "packaging/native-runtime-allowlist.json"
      - "packaging/release-targets.json"
      - "packaging/scripts/audit_native_dependencies.py"
      - "packaging/scripts/verify_native_stage.py"
      - "tests/test_real_engine.py"
      - "src/holderpro/**"
      - "pyproject.toml"
      - ".github/workflows/native.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: native-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-arm64
            runner: macos-15
          - target: macos-x86_64
            runner: macos-15-intel
          - target: linux-x86_64
            runner: ubuntu-22.04
          - target: windows-x86_64
            runner: windows-2022
    runs-on: ${{ matrix.runner }}
    env:
      HOLDERPRO_NATIVE_CACHE: ${{ github.workspace }}/.native-cache
      HOLDERPRO_BUILD_ID: ${{ github.sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11.9"
          cache: pip
      - name: Read the product version from package metadata
        shell: bash
        run: |
          version=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
          echo "HOLDERPRO_VERSION=$version" >> "$GITHUB_ENV"
      - uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ${{ github.workspace }}/.native-cache
          key: prusa-2.9.6-${{ matrix.target }}-${{ hashFiles('scripts/build-native.*', 'scripts/prefetch-native-dependencies.cmake', 'packaging/prusaslicer-native-dependency-sources.json', 'native/CMakePresets.json') }}
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y autoconf automake libdbus-1-dev libgl1-mesa-dev libtool m4 ninja-build texinfo
      - if: runner.os == 'macOS'
        run: |
          brew install autoconf automake libtool m4 ninja texinfo
          echo "$(brew --prefix texinfo)/bin" >> "$GITHUB_PATH"
      - if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
        with:
          arch: x64
      - name: Build and test native engine (Unix)
        if: runner.os != 'Windows'
        run: ./scripts/build-native.sh --preset "${{ matrix.target }}" --download-source --version "$HOLDERPRO_VERSION" --build-id "$HOLDERPRO_BUILD_ID"
      - name: Build and test native engine (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/build-native.ps1 -Preset "${{ matrix.target }}" -DownloadSource -Version $env:HOLDERPRO_VERSION -BuildId $env:HOLDERPRO_BUILD_ID
      - name: Save completed native dependency cache
        uses: actions/cache/save@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ${{ github.workspace }}/.native-cache
          key: prusa-2.9.6-${{ matrix.target }}-${{ hashFiles('scripts/build-native.*', 'scripts/prefetch-native-dependencies.cmake', 'packaging/prusaslicer-native-dependency-sources.json', 'native/CMakePresets.json') }}
      - name: Install auditable native runtime (Unix)
        if: runner.os != 'Windows'
        run: cmake --install native/build/${{ matrix.target }} --prefix native/stage/${{ matrix.target }} --strip
      - name: Install auditable native runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --install native/build/${{ matrix.target }} --prefix native/stage/${{ matrix.target }}
      - name: Verify native identity and provenance
        run: python packaging/scripts/verify_native_stage.py --native-bin native/stage/${{ matrix.target }}/bin --expected-version "${{ env.HOLDERPRO_VERSION }}" --expected-target ${{ matrix.target }} --expected-build-id "${{ env.HOLDERPRO_BUILD_ID }}" --manifest-out native/stage/${{ matrix.target }}/MANIFEST.json
      - name: Audit native runtime
        run: |
          python -m pip install pefile
          python packaging/scripts/audit_native_dependencies.py native/stage/${{ matrix.target }}/bin/holderpro-organic-engine${{ runner.os == 'Windows' && '.exe' || '' }} --companion-dir native/stage/${{ matrix.target }}/bin
      - name: Real-engine regression suite
        env:
          HOLDERPRO_REAL_ENGINE: ${{ github.workspace }}/native/stage/${{ matrix.target }}/bin/holderpro-organic-engine${{ runner.os == 'Windows' && '.exe' || '' }}
        run: |
          python -m pip install -e ".[dev]"
          python -c "from pathlib import Path; assert Path('tests/test_real_engine.py').is_file()"
          pytest tests/test_real_engine.py
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: native-${{ matrix.target }}
          path: native/stage/${{ matrix.target }}
          if-no-files-found: error
          retention-days: 14
