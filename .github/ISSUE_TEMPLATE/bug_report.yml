name: Bug report
description: Report reproducible HolderPro behavior using a safe synthetic model
title: "[Bug]: "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Do not upload private/user-derived models or unredacted paths. Security issues belong in a private advisory.
  - type: input
    id: version
    attributes:
      label: HolderPro version
      description: Paste `holderpro version --json` or identify the release asset.
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS arm64
        - macOS x86_64
        - Windows x64
        - Linux x86_64
        - Source checkout
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the complete error text.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Use a small redistribution-safe synthetic model whenever possible.
      placeholder: |
        1. Open ...
        2. Paint ...
        3. Generate ...
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Redacted diagnostics
      description: Paste doctor output or attach a diagnostic bundle after reviewing it.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I reviewed attachments and have permission to share every included file.
          required: true
